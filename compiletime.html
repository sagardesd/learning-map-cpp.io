<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C++ Compile-Time Programming — Reading List</title>
  <style>
    :root {
      --bg-primary: #0f0c29;
      --bg-secondary: #1a1a3e;
      --bg-card: #1c1c3a;
      --bg-input: #12122a;
      --text-primary: #e0e0e0;
      --text-secondary: #8899aa;
      --text-muted: #556677;
      --border: #2a2a50;
      --success: #2ecc71;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(170deg, var(--bg-primary), var(--bg-secondary), var(--bg-primary));
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      padding: 40px 20px 30px;
    }
    header h1 {
      font-size: 2.2rem;
      background: linear-gradient(90deg, #3498db, #1abc9c, #9b59b6, #e74c3c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      max-width: 750px;
      margin: 0 auto;
      line-height: 1.5;
    }
    
    .progress-container {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 18px 24px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.85rem;
    }
    .progress-header span:first-child {
      color: var(--text-secondary);
    }
    .progress-header span:last-child {
      color: var(--success);
      font-weight: 600;
    }
    .progress-bar {
      height: 10px;
      background: var(--bg-input);
      border-radius: 5px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3498db, #1abc9c, #9b59b6, #e74c3c);
      border-radius: 5px;
      transition: width 0.5s ease;
      width: 0%;
    }

    .list-wrapper {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--bg-card);
      margin-bottom: 30px;
    }

    .topic-row {
      display: grid;
      grid-template-columns: 36px 1fr 1fr;
      gap: 12px;
      align-items: start;
      padding: 16px 20px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    .topic-row:last-child {
      border-bottom: none;
    }
    .topic-row:hover {
      background: #22224a;
    }
    .topic-row.has-link {
      border-left: 3px solid var(--success);
    }
    
    .topic-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      margin-top: 2px;
    }
    
    .topic-info { min-width: 0; }
    .topic-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .topic-details {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.4;
    }
    
    .links-cell {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .link-entry {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .link-saved {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }
    .link-saved a {
      color: #3498db;
      font-size: 0.85rem;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    .link-saved a:hover {
      text-decoration: underline;
      color: #5dade2;
    }
    .open-btn {
      padding: 6px 12px;
      border-radius: 6px;
      background: #3498db;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: background 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .open-btn:hover {
      background: #2980b9;
    }

    .search-box {
      display: flex;
      justify-content: center;
      margin-bottom: 25px;
    }
    .search-box input {
      width: 100%;
      max-width: 500px;
      padding: 12px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus {
      border-color: #3498db;
    }
    .search-box input::placeholder {
      color: var(--text-muted);
    }
    
    footer {
      text-align: center;
      padding: 20px 20px 40px;
      color: var(--text-muted);
      font-size: 0.8rem;
      line-height: 1.6;
    }
    footer a {
      color: #3498db;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
    
    .back-home {
      display: inline-flex;
      align-items: center;
      margin-top: 10px;
      margin-bottom: 10px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      transition: color 0.2s ease, transform 0.2s ease;
    }
    .back-home:hover {
      color: var(--text-primary);
      transform: translateX(-4px);
    }
    
    @media (max-width: 768px) {
      header h1 { font-size: 1.8rem; }
      .topic-row {
        grid-template-columns: 30px 1fr;
        gap: 12px;
        padding: 14px;
      }
      .links-cell {
        grid-column: 1 / -1;
        margin-left: 42px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-home">
    &larr; Back to Home
  </a>
  <header>
    <h1>C++ Compile-Time Programming</h1>
    <p>
      Templates, specialization, TMP, variadic templates, fold expressions, constexpr,
      static_assert, Concepts, CRTP, and every compile-time tool from C++11 to C++23.
    </p>
  </header>
  
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍  Search topics... (e.g. constexpr, concept, variadic, CRTP)">
  </div>
  
  <div class="progress-container">
    <div class="progress-header">
      <span>Topics with articles linked</span>
      <span id="progressText">—</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
    </div>
  </div>
  
  <div class="list-wrapper" id="topicList"></div>
  
  <footer>
    References:
    <a href="https://cppreference.com" target="_blank">cppreference.com</a> •
    <a href="https://godbolt.org" target="_blank">godbolt.org</a>
  </footer>
</div>

<script>
const topics = [
  {
    name: "C++ Templates Tutorial: Function and Class Templates",
    details: "A foundational guide covering how function and class templates work in C++.",
    link: "https://medium.com/@sagar.necindia/cpp-templates-function-and-class-templates-guide-5d97599d3fc4"
  },
  {
    name: "Why C++ Templates Must Be Defined in Headers",
    details: "Explains the linker mechanics behind template instantiation and .cpp separation errors.",
    link: "https://medium.com/@sagar.necindia/why-cplusplus-templates-must-be-in-headers-a90b5f785c71"
  },
  {
    name: "C++ Function Template Specialization",
    details: "Covers how to provide custom implementations of function templates for specific types.",
    link: "https://medium.com/@sagar.necindia/c-function-template-specialization-531ca6f76d1d"
  },
  {
    name: "C++ Class Template Specialization",
    details: "Dives into full and partial class template specialization for tailored data layouts.",
    link: "https://medium.com/@sagar.necindia/c-class-template-specialization-a2d0f6a85105"
  },
  {
    name: "Template Metaprogramming (TMP)",
    details: "Using C++ templates as a compile-time computation engine with type traits.",
    link: "https://medium.com/@sagar.necindia/template-meta-programming-tmp-8416ac81b5dd"
  },
  {
    name: "C++11 Variadic Templates",
    details: "Enabling functions and classes to accept any number of template arguments safely.",
    link: "https://medium.com/@sagar.necindia/c-11-variadic-templates-6751f81f83cf"
  },
  {
    name: "C++17 Fold Expressions",
    details: "A cleaner C++17 syntax for reducing parameter packs and variadic patterns.",
    link: "https://towardsdev.com/cpp-fold-expressions-variadic-templates-da00b3992b1f"
  },
  {
    name: "constexpr: Modern Metaprogramming",
    details: "Introduces constexpr as the backbone of modern compile-time programming.",
    link: "https://medium.com/@sagar.necindia/constexpr-part-i-the-engine-of-modern-c-meta-programming-d9896938f8ba"
  },
  {
    name: "C++ constexpr Functions Guide",
    details: "A practical guide to writing constexpr functions that execute at compile time.",
    link: "https://medium.com/@sagar.necindia/cpp-constexpr-functions-6b78182e68bc"
  },
  {
    name: "Evolution of constexpr",
    details: "Traces the progression of constexpr from its limited C++11 form to powerful C++20.",
    link: "https://medium.com/@sagar.necindia/cpp-constexpr-evolution-cpp11-to-cpp20-8830aa9a1275"
  },
  {
    name: "static_assert: Validation Guide",
    details: "Enforcing compile-time constraints on template parameters and program logic.",
    link: "https://medium.com/@sagar.necindia/cpp-static-assert-compile-time-validation-guide-740d933bfd8c"
  },
  {
    name: "if constexpr: Branching in C++17",
    details: "Discarding branches at compile time inside templates for cleaner type dispatch.",
    link: "https://medium.com/@sagar.necindia/cpp-if-constexpr-ebe46c3da9cf"
  },
  {
    name: "C++20 Abbreviated Function Templates",
    details: "A modern approach to generic programming using auto parameters.",
    link: "https://medium.com/@sagar.necindia/c-20-abbreviated-function-templates-a-modern-approach-to-generic-programming-ff98e4f5316c"
  },
  {
    name: "C++20 Concepts",
    details: "A first-class way to constrain template parameters and produce clearer errors.",
    link: "https://towardsdev.com/c-concepts-constraining-templates-c-20-c862f2947c61"
  },
  {
    name: "constinit vs constexpr",
    details: "Solving the static initialization fiasco in C++20 with constinit.",
    link: "https://medium.com/@sagar.necindia/cpp20-constinit-guide-static-initialization-7f6372d9c928"
  },
  {
    name: "consteval in C++20",
    details: "Forcing immediate functions to always execute at compile time.",
    link: "https://towardsdev.com/consteval-cpp20-guide-6e8175dd4a73"
  },
  {
    name: "CRTP Explained",
    details: "Curiously Recurring Template Pattern for zero-overhead static polymorphism.",
    link: "https://medium.com/@sagar.necindia/crtp-curiously-recurring-template-pattern-in-c-90981941bf38"
  },
  {
    name: "From CRTP to Deducing this",
    details: "How C++23's 'deducing this' finally makes static polymorphism readable.",
    link: "https://towardsdev.com/cpp23-crtp-deducing-this-simplified-59319dfdd796"
  },
  {
    name: "C++23 if consteval",
    details: "Detecting Compile-Time vs Runtime Context within a single function.",
    link: "https://medium.com/@sagar.necindia/cpp23-if-consteval-compile-time-vs-runtime-context-b1aad8cec3d1"
  },
  {
    name: "C++23 std::unreachable()",
    details: "The feature that lets you talk to the optimizer and eliminate dead code.",
    link: "https://medium.com/@sagar.necindia/cpp23-std-unreachable-compiler-optimization-1ab0251be605"
  },
  {
    name: "C++23's [[assume]]",
    details: "Telling compilers what you already know about program state for better optimization.",
    link: "https://medium.com/@sagar.necindia/c-23s-assume-how-to-tell-compilers-what-you-already-know-fbab65170eb7"
  }
];

// Vibrant colors that match the header gradient and fundamentals theme
const colors = ['#e74c3c', '#1abc9c', '#3498db', '#9b59b6', '#e67e22'];

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function renderList() {
  const container = document.getElementById("topicList");
  let html = "";
  let linkedCount = 0;

  topics.forEach((topic, index) => {
    const hasLink = topic.link.trim() !== "";
    if (hasLink) linkedCount++;
    
    const badgeColor = colors[index % colors.length];

    html += `
      <div class="topic-row ${hasLink ? 'has-link' : ''}" 
           data-searchable="${topic.name.toLowerCase()} ${topic.details.toLowerCase()}">
        
        <div class="topic-number" style="background: ${badgeColor}">
          ${index + 1}
        </div>
        
        <div class="topic-info">
          <div class="topic-name">${topic.name}</div>
          <div class="topic-details">${topic.details}</div>
        </div>
        
        <div class="links-cell">
          ${hasLink ? `
            <div class="link-entry">
              <div class="link-saved">
                <a href="${escapeHtml(topic.link)}" target="_blank">${escapeHtml(topic.link)}</a>
              </div>
              <a class="open-btn" href="${escapeHtml(topic.link)}" target="_blank">Open ↗</a>
            </div>
          ` : `
            <span style="color: var(--text-muted); font-size: 0.8rem; font-style: italic; margin-top: 4px;">
              No article linked yet
            </span>
          `}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;

  // Update progress
  const pct = topics.length > 0 ? Math.round((linkedCount / topics.length) * 100) : 0;
  document.getElementById("progressText").textContent = `${linkedCount} / ${topics.length} topics (${pct}%)`;
  document.getElementById("progressFill").style.width = `${pct}%`;
}

// Search functionality
document.getElementById("searchInput").addEventListener("input", (e) => {
  const query = e.target.value.toLowerCase().trim();
  const rows = document.querySelectorAll(".topic-row");

  rows.forEach((row) => {
    const text = row.getAttribute("data-searchable");
    row.style.display = !query || text.includes(query) ? "" : "none";
  });
});

renderList();
</script>
</body>
</html>
