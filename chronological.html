  <style>
    :root {
      --bg-primary: #0f0c29;
      --bg-secondary: #1a1a3e;
      --bg-card: #1c1c3a;
      --bg-input: #12122a;
      --text-primary: #e0e0e0;
      --text-secondary: #8899aa;
      --text-muted: #556677;
      --border: #2a2a50;
      --cpp11: #00b894;
      --cpp11-dim: #00b89430;
      --cpp14: #e67e22;
      --cpp14-dim: #e67e2230;
      --cpp17: #fdcb6e;
      --cpp17-dim: #fdcb6e30;
      --cpp20: #3498db;
      --cpp20-dim: #3498db30;
      --cpp23: #9b59b6;
      --cpp23-dim: #9b59b630;
      --success: #2ecc71;
      --danger: #e74c3c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(170deg, var(--bg-primary), var(--bg-secondary), var(--bg-primary));
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 40px 20px 30px;
    }

    header h1 {
      font-size: 2.2rem;
      background: linear-gradient(90deg, #00b894, #3498db, #9b59b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* ── Controls bar ── */
    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px 0 30px;
      flex-wrap: wrap;
    }

    .controls button {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-collapse {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border) !important;
    }

    .btn-collapse:hover {
      border-color: var(--text-secondary) !important;
      color: var(--text-primary);
    }

    /* ── Progress bar ── */
    .progress-container {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 18px 24px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.85rem;
    }

    .progress-header span:first-child {
      color: var(--text-secondary);
    }

    .progress-header span:last-child {
      color: var(--success);
      font-weight: 600;
    }

    .progress-bar {
      height: 10px;
      background: var(--bg-input);
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cpp11), var(--cpp20), var(--cpp23));
      border-radius: 5px;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* ── Phase sections ── */
    .phase {
      margin-bottom: 30px;
    }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 22px;
      border-radius: 14px 14px 0 0;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }

    .phase-header:hover {
      filter: brightness(1.1);
    }

    .phase-header.collapsed {
      border-radius: 14px;
    }

    .phase-badge {
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      min-width: 80px;
    }

    .phase-title {
      font-size: 1rem;
      color: #ffffffcc;
      flex: 1;
    }

    .phase-count {
      font-size: 0.8rem;
      color: #ffffff99;
      background: #ffffff15;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .phase-chevron {
      color: #ffffff88;
      font-size: 1.2rem;
      transition: transform 0.3s;
    }

    .phase-header.collapsed .phase-chevron {
      transform: rotate(-90deg);
    }

    .phase-body {
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 14px 14px;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease;
    }

    .phase-body.hidden {
      max-height: 0 !important;
      opacity: 0;
      overflow: hidden;
    }

    /* ── Topic rows ── */
    .topic-row {
      display: grid;
      grid-template-columns: 36px 1fr 1fr;
      gap: 12px;
      align-items: start;
      padding: 12px 20px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .topic-row:last-child {
      border-bottom: none;
    }

    .topic-row:hover {
      background: #22224a;
    }

    .topic-row.has-link {
      border-left: 3px solid var(--success);
    }

    .topic-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .topic-info {
      min-width: 0;
    }

    .topic-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .topic-details {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Static Links Cell ── */
    .links-cell {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .link-entry {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .link-entry-number {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      min-width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .link-saved {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }

    .link-saved a {
      color: var(--cpp20);
      font-size: 0.82rem;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .link-saved a:hover {
      text-decoration: underline;
      color: #5dade2;
    }

    .open-btn {
      padding: 4px 8px;
      border-radius: 6px;
      background: var(--cpp20);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: background 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .open-btn:hover {
      background: #2980b9;
    }

    /* ── Search ── */
    .search-box {
      display: flex;
      justify-content: center;
      margin-bottom: 25px;
    }

    .search-box input {
      width: 100%;
      max-width: 500px;
      padding: 12px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: var(--cpp20);
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 0.8rem;
      line-height: 1.6;
    }

    footer a {
      color: var(--cpp20);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      header h1 { font-size: 1.5rem; }

      .topic-row {
        grid-template-columns: 30px 1fr;
        gap: 8px;
        padding: 12px 14px;
      }

      .links-cell {
        grid-column: 1 / -1;
      }

      .controls { gap: 8px; }
      .controls button {
        padding: 8px 14px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>

let allCollapsed = false;

function getTopicKey(phaseId, index) {
  return `${phaseId}_${index}`;
}

// ── Rendering (Read-Only) ──
function renderRoadmap() {
  const container = document.getElementById("roadmap");
  let html = "";

  roadmap.forEach((phase) => {
    html += `<div class="phase" data-phase="${phase.id}">`;

    // Phase header
    html += `
      <div class="phase-header"
           style="background: ${phase.dimColor};
                  border: 1px solid ${phase.color}40;"
           onclick="togglePhase('${phase.id}')">
        <span class="phase-badge"
              style="color: ${phase.color}">
          ${phase.label}
        </span>
        <span class="phase-title">${phase.subtitle}</span>
        <span class="phase-count">
          ${phase.topics.length} topics
        </span>
        <span class="phase-chevron"
              id="chevron-${phase.id}">▾</span>
      </div>
    `;

    // Phase body
    html += `<div class="phase-body" id="body-${phase.id}">`;

    phase.topics.forEach((topic, i) => {
      const key = getTopicKey(phase.id, i);
      const links = savedLinks[key] || [];
      const hasLinks = links.length > 0;

      html += `
        <div class="topic-row ${hasLinks ? "has-link" : ""}"
             data-key="${key}"
             data-searchable="${topic.name.toLowerCase()} ${topic.details.toLowerCase()}">
          <div class="topic-number"
               style="background: ${phase.color}">
            ${i + 1}
          </div>
          <div class="topic-info">
            <div class="topic-name">${topic.name}</div>
            <div class="topic-details">
              ${topic.details}
            </div>
          </div>
          <div class="links-cell">
            ${renderLinksForTopic(links)}
          </div>
        </div>
      `;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
  updateProgress();
}

/**
 * Renders read-only static links for a single topic.
 */
function renderLinksForTopic(links) {
  if (!links || links.length === 0) {
    return `<span style="color: var(--text-muted); font-size: 0.78rem; font-style: italic;">` + 
           `_No articles linked_</span>`;
  }
  
  let html = "";
  links.forEach((link, li) => {
    html += `
      <div class="link-entry">
        <span class="link-entry-number">${li + 1}.</span>
        <div class="link-saved">
          <a href="${escapeHtml(link)}" target="_blank">${escapeHtml(link)}</a>
        </div>
        <a class="open-btn" href="${escapeHtml(link)}" target="_blank" style="display: inline-block;">
          Open ↗
        </a>
      </div>
    `;
  });

  return html;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ── Interactions ──
function togglePhase(phaseId) {
  const body = document.getElementById(`body-${phaseId}`);
  const chevron = document.getElementById(
    `chevron-${phaseId}`
  );
  const header = chevron.closest(".phase-header");

  body.classList.toggle("hidden");
  header.classList.toggle("collapsed");
}

function toggleAllSections() {
  allCollapsed = !allCollapsed;
  roadmap.forEach((phase) => {
    const body = document.getElementById(
      `body-${phase.id}`
    );
    const chevron = document.getElementById(
      `chevron-${phase.id}`
    );
    const header = chevron.closest(".phase-header");

    if (allCollapsed) {
      body.classList.add("hidden");
      header.classList.add("collapsed");
    } else {
      body.classList.remove("hidden");
      header.classList.remove("collapsed");
    }
  });
}

function updateProgress() {
  let total = 0;
  let filled = 0;
  let totalLinks = 0;

  roadmap.forEach((phase) => {
    phase.topics.forEach((_, i) => {
      total++;
      const links = savedLinks[getTopicKey(phase.id, i)] || [];
      if (links.length > 0) {
        filled++;
        totalLinks += links.length;
      }
    });
  });

  const pct =
    total > 0 ? Math.round((filled / total) * 100) : 0;
  document.getElementById(
    "progressText"
  ).textContent =
    `${filled} / ${total} topics (${pct}%)` +
    ` · ${totalLinks} total links`;
  document.getElementById("progressFill").style.width =
    `${pct}%`;
}

// ── Search / Filter ──
document
  .getElementById("searchInput")
  .addEventListener("input", (e) => {
    const query = e.target.value.toLowerCase().trim();
    const rows = document.querySelectorAll(".topic-row");

    rows.forEach((row) => {
      const text = row.getAttribute("data-searchable");
      row.style.display =
        !query || text.includes(query) ? "" : "none";
    });

    // Show all phase bodies when searching
    if (query) {
      roadmap.forEach((phase) => {
        const body = document.getElementById(
          `body-${phase.id}`
        );
        const header = document
          .getElementById(`chevron-${phase.id}`)
          .closest(".phase-header");
        body.classList.remove("hidden");
        header.classList.remove("collapsed");
      });
    }
  });

// ── Initialize ──
renderRoadmap();
</script>
